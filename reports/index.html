<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Research OS｜ナレッジポータル</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #1a2b4a;
      --accent:  #e8630a;
      --accent2: #2e7dd1;
      --bg:      #f4f6f9;
      --card:    #ffffff;
      --text:    #1e2a3a;
      --muted:   #6b7a8d;
      --border:  #dde2ea;
      --green:   #1a7f4b;
      --red:     #c0392b;
    }
    body { font-family: 'Helvetica Neue', 'Noto Sans JP', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

    /* ── Header ── */
    .header { background: var(--primary); color: #fff; padding: 0; }
    .header-inner { max-width: 1160px; margin: 0 auto; padding: 22px 28px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 12px; }
    .brand { font-size: 0.75rem; opacity: .55; margin-bottom: 4px; letter-spacing: .03em; }
    .header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -.01em; }
    .header-right { text-align: right; }
    .header-right .label { font-size: 0.7rem; opacity: .45; margin-bottom: 2px; }
    .header-right #today { font-size: 0.78rem; opacity: .7; }

    /* ── Stats Bar ── */
    .stats-bar { background: rgba(0,0,0,.18); border-top: 1px solid rgba(255,255,255,.07); }
    .stats-inner { max-width: 1160px; margin: 0 auto; padding: 12px 28px; display: flex; gap: 32px; flex-wrap: wrap; }
    .stat { display: flex; align-items: center; gap: 8px; }
    .stat-val { font-size: 1.35rem; font-weight: 800; color: #fff; }
    .stat-label { font-size: 0.72rem; color: rgba(255,255,255,.5); }

    /* ── Toolbar ── */
    .toolbar { background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .toolbar-inner { max-width: 1160px; margin: 0 auto; padding: 10px 28px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap input { width: 100%; padding: 7px 12px 7px 34px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.84rem; color: var(--text); background: var(--bg); outline: none; }
    .search-wrap input:focus { border-color: var(--accent2); }
    .search-wrap .ic { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; font-size: 0.8rem; cursor: pointer; color: var(--muted); transition: all .15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }

    /* ── Main ── */
    .main { max-width: 1160px; margin: 0 auto; padding: 24px 28px; }
    .section-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 14px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }

    /* ── Cards Grid ── */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }

    /* ── Report Card ── */
    .report-card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .2s, transform .2s; }
    .report-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); transform: translateY(-2px); }
    .card-top { padding: 18px 18px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-date { font-size: 0.72rem; color: var(--muted); margin-left: auto; }
    .card-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .card-period { font-size: 0.76rem; color: var(--muted); }
    .card-summary { font-size: 0.83rem; color: var(--text); line-height: 1.65; }
    .kpi-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 4px; }
    .kpi-cell { background: var(--bg); border-radius: 6px; padding: 7px 10px; }
    .kv { font-size: 0.9rem; font-weight: 700; }
    .kv.good { color: var(--green); }
    .kv.bad { color: var(--red); }
    .kl { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
    .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .card-tag { font-size: 0.68rem; background: #eef2f8; color: var(--muted); padding: 2px 7px; border-radius: 10px; }
    .card-bottom { padding: 11px 18px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .card-asin { font-size: 0.72rem; color: var(--muted); font-family: monospace; }
    .card-link { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .card-link:hover { text-decoration: underline; }

    /* ── Platform Tags ── */
    .tag-platform { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
    .tag-amazon  { background: #fff3e6; color: #c45c00; }
    .tag-rakuten { background: #fff0f0; color: #a00000; }
    .tag-yahoo   { background: #fff0f8; color: #7b0099; }

    /* ── Empty ── */
    .empty { text-align: center; padding: 72px 24px; color: var(--muted); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.88rem; }

    /* ── Footer ── */
    .footer { text-align: center; font-size: 0.72rem; color: var(--muted); padding: 28px; border-top: 1px solid var(--border); margin-top: 24px; }

    @media(max-width:680px) {
      .header-inner { padding: 18px 16px; }
      .stats-inner { padding: 10px 16px; gap: 20px; }
      .toolbar-inner { padding: 10px 16px; }
      .main { padding: 16px; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="brand">BabyGoo / fungoo｜株式会社ASAGIRI｜社内限定ドキュメント</div>
      <h1>Amazon Research OS｜ナレッジポータル</h1>
    </div>
    <div class="header-right">
      <div class="label">最終更新</div>
      <div id="today"></div>
    </div>
  </div>
  <div class="stats-bar">
    <div class="stats-inner">
      <div class="stat"><span class="stat-val" id="st-total">0</span><span class="stat-label">レポート数</span></div>
      <div class="stat"><span class="stat-val" id="st-products">0</span><span class="stat-label">対象商品数</span></div>
      <div class="stat"><span class="stat-val" id="st-months">0</span><span class="stat-label">カバー月数</span></div>
      <div class="stat"><span class="stat-val" id="st-platforms">0</span><span class="stat-label">モール数</span></div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <span class="ic">🔍</span>
      <input id="search" type="text" placeholder="商品名・ASIN・タグで検索...">
    </div>
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="Amazon">Amazon</button>
    <button class="filter-btn" data-filter="楽天">楽天</button>
    <button class="filter-btn" data-filter="Yahoo">Yahoo</button>
  </div>
</div>

<div class="main">
  <div class="section-label" id="section-label">全レポート</div>
  <div class="cards-grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="icon">📭</div>
    <p>該当するレポートが見つかりません</p>
  </div>
</div>

<div class="footer">
  Amazon Research OS | BabyGoo / fungoo | 株式会社ASAGIRI | 社内限定
</div>

<script>
const REPORTS = [
  {
    id: "babycutlery-202606",
    createdAt: "2026-07-01",
    period: "2026年3〜6月",
    product: "ベビーカトラリー",
    category: "ベビー用品",
    brand: "BabyGoo",
    asin: "",
    platforms: ["楽天"],
    summary: "3月スーパーSALEで481万円達成後、5月に在庫切れ13日間で機会損失約118万円。6月SALEで321万円に回復。CTR改善とSEO回復が直近の課題。",
    kpi: [
      { label: "楽天売上（6月）",   value: "321万円", good: true  },
      { label: "CVR（全期間）",     value: "13〜15%", good: true  },
      { label: "ACOS（6月）",      value: "19.7%",   good: false },
      { label: "在庫切れ期間",      value: "13日間",  good: false }
    ],
    tags: ["カトラリー", "離乳食", "スプーン", "ベビー", "2026-06", "在庫切れ"],
    file: "2026-06/babycutlery.html"
  }
];

// ── Stats ──────────────────────────────
function calcStats(list) {
  const products  = [...new Set(list.map(r => r.product))].length;
  const platforms = [...new Set(list.flatMap(r => r.platforms))].length;
  const months    = [...new Set(list.map(r => r.period))].length;
  document.getElementById('st-total').textContent     = list.length;
  document.getElementById('st-products').textContent  = products;
  document.getElementById('st-months').textContent    = months;
  document.getElementById('st-platforms').textContent = platforms;
}

// ── Platform tag ───────────────────────
function platformTag(p) {
  const map = { Amazon:'tag-amazon', '楽天':'tag-rakuten', Yahoo:'tag-yahoo' };
  return `<span class="tag-platform ${map[p]||''}">${p}</span>`;
}

// ── Render ─────────────────────────────
function render(list) {
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!list.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = list.map(r => `
    <div class="report-card" data-platforms="${r.platforms.join(',')}" data-id="${r.id}">
      <div class="card-top">
        <div class="card-meta">
          ${r.platforms.map(platformTag).join('')}
          <span class="card-date">${r.createdAt}</span>
        </div>
        <div class="card-title">${r.product}</div>
        <div class="card-period">${r.period}｜${r.category}｜${r.brand}</div>
        <div class="card-summary">${r.summary}</div>
        <div class="kpi-row">
          ${(r.kpi||[]).map(k=>`
            <div class="kpi-cell">
              <div class="kv ${k.good?'good':'bad'}">${k.value}</div>
              <div class="kl">${k.label}</div>
            </div>`).join('')}
        </div>
        <div class="card-tags">${(r.tags||[]).map(t=>`<span class="card-tag">#${t}</span>`).join('')}</div>
      </div>
      <div class="card-bottom">
        <span class="card-asin">${r.asin ? 'ASIN: '+r.asin : ''}</span>
        <a class="card-link" href="${r.file}" target="_blank">レポートを開く →</a>
      </div>
    </div>
  `).join('');
}

// ── Filter ─────────────────────────────
let currentFilter = 'all';
let currentSearch = '';

function applyFilters() {
  let list = REPORTS;
  if (currentFilter !== 'all')
    list = list.filter(r => r.platforms.includes(currentFilter));
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(r =>
      r.product.toLowerCase().includes(q) ||
      (r.asin||'').toLowerCase().includes(q) ||
      r.tags.some(t => t.toLowerCase().includes(q)) ||
      r.summary.toLowerCase().includes(q)
    );
  }
  const label = currentFilter === 'all' ? '全レポート' : currentFilter + ' レポート';
  document.getElementById('section-label').textContent = label + `（${list.length}件）`;
  render(list);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});
document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  applyFilters();
});

// ── Init ───────────────────────────────
const d = new Date();
document.getElementById('today').textContent =
  `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
calcStats(REPORTS);
applyFilters();
</script>

</body>
</html>
